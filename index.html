<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>
        <link href="/css/hoja_de_estilos.css" rel="stylesheet">
        <link rel="shortcut icon" href="/assets/logo_rom.ico" type="image/x-icon">
    </head>
    <body>
        <span id="mensaje"></span>
        <h1>Sistema</h1>
        <div id="formularioInicio" class="formularioContenedor">
            <img src="/assets/logo.jpeg" alt="Logo del equipo R.O.M." id="logo">
            <label for="usuario">Usuario:</label>
            <input type="text" placeholder="Ingresa tu usuario" id="usuario" class="formulario formularioCampo">
            <label for="contra">Contraseña:</label>
            <input type="password" placeholder="Ingresa tu contraseña" id="contra" class="formulario formularioCampo">
            <button id="btnIngresar" class="btnFormulario">Ingresar</button>
            <a href="./pages/registro.html"> ¿No te  has registrado? Hazlo aqui</a>
        </div>
        <script src="/js/script.js"></script>
    </body>
</html>
